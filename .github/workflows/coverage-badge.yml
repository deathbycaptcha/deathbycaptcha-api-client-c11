name: Coverage Badge

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    name: Build, Test, and Publish Coverage Badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcovr

      - name: Build coverage target
        run: |
          rm -rf build/coverage
          cmake -S . -B build/coverage -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_BUILD_TESTS=ON \
            -DDBC_ENABLE_COVERAGE=ON \
            -DDBC_ENABLE_HTTPS=OFF
          cmake --build build/coverage

      - name: Run tests
        run: |
          ctest --test-dir build/coverage --output-on-failure

      - name: Generate coverage percentage
        id: coverage
        run: |
          gcovr --root . --filter 'src/' --exclude 'src/cJSON' build/coverage --print-summary > coverage-summary.txt
          pct=$(awk '/lines:/{print $2}' coverage-summary.txt | tr -d '%')
          if [[ -z "$pct" ]]; then
            echo "Failed to extract coverage percentage"
            cat coverage-summary.txt
            exit 1
          fi
          echo "value=${pct}%" >> "$GITHUB_OUTPUT"
          cat coverage-summary.txt

      - name: Render coverage badge SVG
        run: |
          pct='${{ steps.coverage.outputs.value }}'
          color='e05d44'
          val=${pct%%%}
          # Color thresholds aligned with common CI badge conventions.
          if (( ${val%.*} >= 90 )); then color='4c1';
          elif (( ${val%.*} >= 80 )); then color='97CA00';
          elif (( ${val%.*} >= 70 )); then color='a4a61d';
          elif (( ${val%.*} >= 60 )); then color='dfb317';
          fi

          cat > coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="20" role="img" aria-label="coverage: ${pct}">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r"><rect width="120" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="68" height="20" fill="#555"/>
              <rect x="68" width="52" height="20" fill="#${color}"/>
              <rect width="120" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="35" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="35" y="14">coverage</text>
              <text x="93" y="15" fill="#010101" fill-opacity=".3">${pct}</text>
              <text x="93" y="14">${pct}</text>
            </g>
          </svg>
          EOF

      - name: Ensure badges release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view badges >/dev/null 2>&1; then
            gh release create badges --title "badges" --notes "Auto-updated CI badges assets"
          fi

      - name: Upload coverage badge asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload badges coverage.svg --clobber
