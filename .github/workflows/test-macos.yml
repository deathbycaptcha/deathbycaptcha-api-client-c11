name: Tests macOS

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests-macos:
    name: Unit Tests (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          brew update
          brew install ninja

      - name: Configure (unit tests)
        shell: bash
        run: |
          cmake -S . -B build/macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_ENABLE_HTTPS=OFF \
            -DDBC_BUILD_TESTS=ON

      - name: Build (unit tests)
        shell: bash
        run: |
          cmake --build build/macos --target deathbycaptcha_tests

      - name: Run unit tests
        shell: bash
        run: |
          ctest --test-dir build/macos --output-on-failure -R deathbycaptcha_tests
