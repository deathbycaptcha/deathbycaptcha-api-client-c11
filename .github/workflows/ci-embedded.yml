name: CI Embedded Compatibility

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "ports/esp-idf-smoke/**"
      - ".github/workflows/ci-embedded.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "ports/esp-idf-smoke/**"
      - ".github/workflows/ci-embedded.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  esp-idf-smoke:
    name: ESP-IDF Smoke Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
          - esp32c3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            flex \
            bison \
            gperf \
            python3 \
            python3-pip \
            python3-venv \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev \
            dfu-util \
            libusb-1.0-0

      - name: Set up ESP-IDF
        env:
          IDF_VERSION: v5.2.2
        run: |
          git clone --depth 1 --branch "$IDF_VERSION" https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          "$HOME/esp-idf/install.sh" ${{ matrix.target }}

      - name: Build ESP-IDF smoke app
        run: |
          . "$HOME/esp-idf/export.sh"
          idf.py -C ports/esp-idf-smoke set-target ${{ matrix.target }}
          idf.py -C ports/esp-idf-smoke build
