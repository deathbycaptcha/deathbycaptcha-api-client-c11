name: Coverage

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  coverage:
    name: Build, test and generate coverage badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcovr

      - name: Build coverage target
        run: |
          rm -rf build/coverage
          cmake -S . -B build/coverage -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_BUILD_TESTS=ON \
            -DDBC_ENABLE_COVERAGE=ON \
            -DDBC_ENABLE_HTTPS=OFF
          cmake --build build/coverage

      - name: Run tests
        run: |
          ctest --test-dir build/coverage --output-on-failure

      - name: Generate coverage percentage
        id: coverage
        run: |
          gcovr --root . --filter 'src/' --exclude 'src/cJSON' \
            build/coverage --print-summary > coverage-summary.txt
          pct=$(awk '/lines:/{print $2}' coverage-summary.txt | tr -d '%')
          if [[ -z "$pct" ]]; then
            echo "Failed to extract coverage percentage"
            cat coverage-summary.txt
            exit 1
          fi
          echo "value=${pct}" >> "$GITHUB_OUTPUT"
          cat coverage-summary.txt

      - name: Generate coverage badge JSON (shields.io endpoint schema v1)
        run: |
          pct='${{ steps.coverage.outputs.value }}'
          val=${pct%%.*}
          color="red"
          if (( val >= 85 )); then color="brightgreen";
          elif (( val >= 70 )); then color="yellow";
          fi

          mkdir -p pages
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "${pct}" "${color}" > pages/coverage-badge.json
          cat pages/coverage-badge.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy:
    name: Deploy coverage badge to GitHub Pages
    needs: coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
