name: Tests Linux

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests-linux:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure (unit tests)
        shell: bash
        run: |
          cmake -S . -B build/linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_ENABLE_HTTPS=OFF \
            -DDBC_BUILD_TESTS=ON

      - name: Build (unit tests)
        shell: bash
        run: |
          cmake --build build/linux --target deathbycaptcha_tests

      - name: Run unit tests
        shell: bash
        run: |
          ctest --test-dir build/linux --output-on-failure -R deathbycaptcha_tests
