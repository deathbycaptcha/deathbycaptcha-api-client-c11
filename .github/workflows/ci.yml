name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev

      - name: Configure (unit tests)
        run: |
          cmake -S . -B build/default -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_BUILD_TESTS=ON

      - name: Build (unit tests)
        run: |
          cmake --build build/default --target deathbycaptcha_tests

      - name: Run unit tests
        run: |
          ctest --test-dir build/default --output-on-failure -R deathbycaptcha_tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check integration secrets
        id: secrets_check
        run: |
          if [[ -n "${{ secrets.DBC_USERNAME }}" && -n "${{ secrets.DBC_PASSWORD }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Integration tests enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Integration tests skipped: missing DBC_USERNAME/DBC_PASSWORD secrets"
          fi

      - name: Install build dependencies
        if: ${{ steps.secrets_check.outputs.enabled == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev

      - name: Create integration .env from repository secrets
        if: ${{ steps.secrets_check.outputs.enabled == 'true' }}
        env:
          DBC_USERNAME_SECRET: ${{ secrets.DBC_USERNAME }}
          DBC_PASSWORD_SECRET: ${{ secrets.DBC_PASSWORD }}
        run: |
          # Write source-able assignments with safe escaping for special chars.
          {
            printf 'DBC_USERNAME=%q\n' "$DBC_USERNAME_SECRET"
            printf 'DBC_PASSWORD=%q\n' "$DBC_PASSWORD_SECRET"
          } > .env
          chmod 600 .env

      - name: Configure (integration tests)
        if: ${{ steps.secrets_check.outputs.enabled == 'true' }}
        run: |
          cmake -S . -B build/integration -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDBC_BUILD_TESTS=ON \
            -DDBC_BUILD_INTEGRATION_TESTS=ON \
            -DDBC_ENABLE_HTTPS=ON

      - name: Build CLI for integration
        if: ${{ steps.secrets_check.outputs.enabled == 'true' }}
        run: |
          cmake --build build/integration --target deathbycaptcha

      - name: Run integration test
        if: ${{ steps.secrets_check.outputs.enabled == 'true' }}
        run: |
          ctest --test-dir build/integration -V -R deathbycaptcha_cli_integration

      - name: Integration tests not executed
        if: ${{ steps.secrets_check.outputs.enabled != 'true' }}
        run: |
          echo "Skipping integration-tests job: set DBC_USERNAME and DBC_PASSWORD repository secrets to enable it."

      - name: Upload integration test logs on failure
        if: ${{ failure() && steps.secrets_check.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            build/integration/Testing/Temporary/
            build/integration/LastTest.log
          if-no-files-found: ignore
